<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>CivicEye</title>
<style>
.body{
   background-color: #fff;
}
.creatbtn{
    background-color: rgba(114, 144, 174, 0.3);
    top: 15%;
    right: 38.5%;
    position: absolute;
    width:350px;
    height: 400px;
    border-radius: 5px;
    padding-top: 5px;
}
.text{
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    margin-top: 0px;
   
}
.input-field{
 width: 60%;
 height: 20px;
 margin-top: 2px;
 margin-bottom: 10px;
 margin-right: 25px;
 padding: 10px;
 border: none;
 background-color: rgba(114, 144, 174, 0.3);
 border-radius: 5px;
 color: #fff;

}
.input-field:hover{
     background-color: rgba(114, 144, 174, 0.4);
}
::placeholder{
    font-size: medium;
    color: #fff;
    padding-right: 15px;
        
}

h5{
    color:#fff;
    margin-top: 3px;
    margin-right: 13px;
    margin-bottom: 3px;
}
p{
  color: #fff;
  font-size: 13px;
  margin-right: 13px;
  margin-top: 0%; 
  margin-bottom: 0%;   
}
.creat-btn{
    width:100px;
    height: 28px;
    background-color: #3e61ff;
    border: none;
    border-radius: 5px;
    color: #fff;
    margin-top: 5px;
    margin-right:120px;

}
.creat-btn:hover{
    background-color: #5e7cff;
}
</style>
</head>
<body >
<div class="creatbtn">
<div class="text" style=" font-size: 23px;">انشاء حساب</div>
<div class="text"style=" font-size: 15px;color: rgba(255, 255, 255, 0.546);">الامر سهل و بسيط </div>
<hr style="height:2px;width:100%;border: #fff ;background-color: #fff;">
<div>
    <input type="text"class="input-field" placeholder="اسم العائلة " dir="rtl">
    <input type="text" class="input-field" placeholder="اسم الاول" dir="rtl">
    <h5>تاريخ الميلاد</h5>
    <div >
        <input type="date"class="input-field" >
        <input type="email" type="tel" class="input-field"placeholder="رقم الهاتف او البريد الالكتروني">
        <input type="password" class="input-field"placeholder="كلمة السر">
        <p>قد تتلقى اشعارات عبر رسائل نصية قصيرة هنا لاثبات هويتك </p>
        <button class="creat-btn"><a href="home.html" style="color: #fff;text-decoration: none;">تسجيل الدخول</a></button>

    </div>
</div>

</div>
</body>    
</html>
