<script>
// ======================== التكوين والإعدادات ========================
const API_BASE_URL = 'https://api.civiceye.com/v1'; ////شي يخص API

// ======================== المتغيرات العامة ========================
let map;                    // الخريطة
let currentMarker = null;   // علامة الخريطة
let selectedProblemType = null;  // نوع المشكلة
let selectedImageFiles = [];      // الصور المحملة
let selectedPosition = { lat: 34.6728, lng: 3.2630 };  // موقع الجلفة كقيمة اولية
const MAX_IMAGES = 4;       // العدد الاقصى من الصور
   

// ======================== دوال المصادقة ========================

// التحقق من وجود مستخدم مسجل الدخول
 // باش لي يرسل البلاغ مايكونش شخص مجهول
function checkAuthentication() {
    try {
        // محاولة جلب التوكن من localStorage
        let authToken = localStorage.getItem('authToken');
        const userStr = localStorage.getItem('currentUser');
        
        if (!authToken || !userStr) {
            console.log('❌ لا يوجد مستخدم مسجل الدخول');
            return false;
        }
        
        currentUser = JSON.parse(userStr);
        //كي توجدي APIشوفي اذا تسحقي ذا الجزء ام لا
        // التحقق من صحة التوكن مع API (اختياري لكن يفضل)
        // يمكن تفعيل هذا الجزء عندما يكون API جاهزاً
        /*
        fetch(`${API_BASE_URL}/auth/verify`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${authToken}`
            }
        }).then(res => {
            if (!res.ok) {
                throw new Error('توكن غير صالح');
            }
        }).catch(() => {
            showToast('⚠️ جلسة منتهية، الرجاء تسجيل الدخول مجدداً');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        });
        */
        
        console.log('✅ مستخدم مسجل:', currentUser.firstName, currentUser.lastName);
        return true;
    } catch (error) {
        console.error('خطأ في التحقق من المصادقة:', error);
        return false;
    }
}

/**
 * تسجيل الخروج
 */
function logout() {
    localStorage.removeItem('authToken');
    localStorage.removeItem('currentUser');
    showToast('👋 تم تسجيل الخروج');
    setTimeout(() => {
        window.location.href = 'login.html';
    }, 1500);
}

// ======================== دوال API ========================

/**
 * إرسال البلاغ إلى الخادم
 */
async function sendReportToAPI(formData) {
    try {
        console.log('📤 جاري إرسال البلاغ إلى API...');
        
        // محاكاة إرسال ناجح بدلاً من الاتصال بـ API وهمي
        // هذا يسمح للبلاغات بالعمل حتى بدون اتصال بالإنترنت
        return new Promise((resolve) => {
            setTimeout(() => {
                resolve({ 
                    success: true, 
                    reportId: 'rep_' + Date.now(),
                    message: 'تم استلام البلاغ بنجاح'
                });
            }, 500);
        });
        
    } catch (error) {
        // معالجة أخطاء الشبكة
        if (error.name === 'TypeError' && error.message.includes('fetch')) {
            throw new Error('🌐 خطأ في الاتصال بالخادم، تأكد من اتصالك بالإنترنت');
        }
        throw error;
    }
}

/**
 * حفظ نسخة محلية كاحتياطي (عند فشل الاتصال بالخادم)
 */
//مثلا كي يكون المستخدم ماعندوش الانترنت بصح دار البلاغ كي يتصل بالانترنت مايعاودش يكتبو


// ======================== دوال الخريطة ========================

function initMap() {
    map = L.map('map').setView([selectedPosition.lat, selectedPosition.lng], 15);//انشاء الخريطة في الكلاس ذي
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 19
    }).addTo(map);
    
    currentMarker = L.marker([selectedPosition.lat, selectedPosition.lng], { draggable: true }).addTo(map);
    
    map.on('click', function(e) {
        selectedPosition = { lat: e.latlng.lat, lng: e.latlng.lng };
        currentMarker.setLatLng(e.latlng);
        showToast('📍 تم تحديد موقع جديد');
    });
    
    currentMarker.on('dragend', function(e) {
        const pos = e.target.getLatLng();
        selectedPosition = { lat: pos.lat, lng: pos.lng };
        showToast('📍 تم تغيير موقع العلامة');
    });
}

// ======================== دوال واجهة المستخدم ========================

function setupProblemTypeSelection() {//اختيار نوع المشكلة 
    const icons = document.querySelectorAll('.icon-container');
    icons.forEach(icon => {
        icon.addEventListener('click', function() {
            icons.forEach(i => i.classList.remove('active'));//ينزع التحديد من كل الاختيارات و تبقى وحدة
            this.classList.add('active');
            selectedProblemType = this.getAttribute('data-type');
            const problemName = this.querySelector('.icon-title').textContent;
            showToast(`✅ تم اختيار: ${problemName}`);
        });
    });
}

function setupProblemDescriptionEnhancements() {// دالة تخص جزء وصف المشكلة 
    const textarea = document.getElementById('problemDescription');// المربع لي يتكتب فيه النص
    const charCountSpan = document.getElementById('charCountDisplay');//عداد النص
    const clearBtn = document.getElementById('clearTextBtn');// زر المسح
    const MAX_CHARS = 500;// اقصى عدد الاحرف المسموح به 
    
    function updateCharCounterAndResize() {//دالة المسؤولة عن تحديث العداد
        const currentLength = textarea.value.length;
        const remaining = MAX_CHARS - currentLength;// العدد المتبقي من احرووف
        charCountSpan.textContent = remaining;
        
        if (remaining <= 0) {
            charCountSpan.classList.add('danger');
            charCountSpan.classList.remove('warning');
        } else if (remaining <= 50) {
            charCountSpan.classList.add('warning');
            charCountSpan.classList.remove('danger');
        } else {
            charCountSpan.classList.remove('warning', 'danger');
        }
        
        textarea.style.height = 'auto';//تحديث تلقائي في طول المربع لي نكتبو فيه 
        let newHeight = Math.min(200, Math.max(82, textarea.scrollHeight));
        textarea.style.height = newHeight + 'px';
    }
    
    function handleInput(e) {// دالة مسؤولة واش يصرا اذا فات الحد المسموح به من الاحرف
        if (textarea.value.length > MAX_CHARS) {
            textarea.value = textarea.value.substring(0, MAX_CHARS);
            showToast(`⚠️ لا يمكنك إدخال أكثر من ${MAX_CHARS} حرف`, 2000);
        }
        updateCharCounterAndResize(); //يستدعي الدالة 
    }
    
    clearBtn.addEventListener('click', () => {
        if (textarea.value.trim() !== '') {
            textarea.value = '';
            updateCharCounterAndResize();
            textarea.focus();
            showToast('🧹 تم مسح وصف المشكلة');
        } else {
            showToast('الحقل فارغ بالفعل');
        }
    });
    
    textarea.addEventListener('input', handleInput);
    textarea.addEventListener('keydown', function(e) {
        if (textarea.value.length >= MAX_CHARS && 
            e.key !== 'Backspace' && e.key !== 'Delete' && 
            !e.ctrlKey && !e.metaKey) {
            e.preventDefault();
            showToast(`⚠️ الحد الأقصى ${MAX_CHARS} حرف`, 1500);
        }
    });
    
    updateCharCounterAndResize();
}

function renderGallery() {// دالة تخص الدزء التعلق بالصور
    const gallery = document.getElementById('imagesGallery');// انشاء متغير لي يحمل الصور قصدي المربع ذاكلي فيه زائد
    gallery.innerHTML = '';
    
    for (let i = 0; i < selectedImageFiles.length; i++) {
        const file = selectedImageFiles[i];
        const imageUrl = URL.createObjectURL(file);
        const imageCard = document.createElement('div');
        imageCard.className = 'image-card';
        imageCard.innerHTML = `
            <img src="${imageUrl}" alt="صورة ${i + 1}">
            <button class="remove-img-btn" data-index="${i}" title="إزالة الصورة">✕</button>
        `;
        gallery.appendChild(imageCard);
        imageCard.querySelector('img').onload = () => URL.revokeObjectURL(imageUrl);
    }
    
    const remainingSlots = MAX_IMAGES - selectedImageFiles.length;
    for (let i = 0; i < remainingSlots; i++) {
        const placeholder = document.createElement('div');
        placeholder.className = 'image-card-placeholder';
        placeholder.innerHTML = '<span class="placeholder-text">+</span>';
        placeholder.addEventListener('click', () => triggerFileUpload());
        gallery.appendChild(placeholder);
    }
    
    document.querySelectorAll('.remove-img-btn').forEach(btn => {// دالة تخص ازالة الصور
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const index = parseInt(btn.getAttribute('data-index'));
            removeImage(index);
        });
    });
}

function removeImage(index) {// دالة تخص ازالة الصور
    selectedImageFiles.splice(index, 1);
    renderGallery();
    showToast(`🗑️ تم إزالة الصورة`);
}

function triggerFileUpload() {// دالة تخص ازالة الصورادا فات عدد الصور اربعة 
    if (selectedImageFiles.length >= MAX_IMAGES) {
        showToast(`⚠️ لا يمكنك إضافة أكثر من ${MAX_IMAGES} صور`);
        return;
    }
    document.getElementById('fileUpload').click();
}

function setupMultipleImageUpload() {// تسمح باضافة شحال من صورة 
    const fileInput = document.getElementById('fileUpload');
    const uploadArea = document.getElementById('uploadArea');
    
    uploadArea.addEventListener('click', () => triggerFileUpload());
    
    fileInput.addEventListener('change', function(e) {
        const files = Array.from(e.target.files);
        const availableSlots = MAX_IMAGES - selectedImageFiles.length;
        
        if (files.length === 0) return;
        
        if (files.length > availableSlots) {
            showToast(`⚠️ يمكنك إضافة ${availableSlots} صور فقط. تم اختيار ${files.length}`);
            return;
        }
        
        // التحقق من حجم الصور (حد أقصى 5MB لكل صورة)
        const MAX_FILE_SIZE = 5 * 1024 * 1024; // 5MB
        for (const file of files) {
            if (!file.type.startsWith('image/')) {
                showToast(`⚠️ الملف "${file.name}" ليس صورة`);
                return;
            }
            if (file.size > MAX_FILE_SIZE) {
                showToast(`⚠️ الصورة "${file.name}" حجمها كبير جداً (حد أقصى 5MB)`);
                return;
            }
        }
        
        selectedImageFiles.push(...files);
        renderGallery();
        showToast(`✅ تم إضافة ${files.length} صور`);
        fileInput.value = '';
    });
}

function setupAutocomplete() {// دالة تخص البحث اليدوي
    const input = document.getElementById("searchInput");
    let debounceTimer;
    
    input.addEventListener("input", function() {
        clearTimeout(debounceTimer);
        const query = input.value.trim();
        if (query.length < 3) return;
        
        debounceTimer = setTimeout(() => {
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&addressdetails=1&limit=5`)
                .then(res => res.json())
                .then(data => {
                    const old = document.getElementById("resultsList");
                    if (old) old.remove();
                    if (data.length === 0) return;
                    
                    const list = document.createElement("div");
                    list.id = "resultsList";
                    
                    data.forEach(place => {
                        const name = place.display_name;
                        const item = document.createElement("div");
                        item.style.padding = "8px";
                        item.style.cursor = "pointer";
                        item.style.borderBottom = "1px solid #eee";
                        item.textContent = name;
                        item.onclick = () => {
                            const lat = parseFloat(place.lat);
                            const lng = parseFloat(place.lon);
                            selectedPosition = { lat, lng };
                            map.setView([lat, lng], 16);
                            currentMarker.setLatLng([lat, lng]);
                            currentMarker.bindPopup(`📍 ${name}`).openPopup();
                            list.remove();
                            input.value = name;
                        };
                        list.appendChild(item);
                    });
                    
                    const searchDiv = document.querySelector(".search");
                    searchDiv.style.position = "relative";
                    searchDiv.appendChild(list);
                })
                .catch(() => console.log("خطأ في البحث"));
        }, 500);
    });
}

function searchLocation() {// دالة المسؤولة عن تحديد البحث اليدوي على الخريطة
    const query = document.getElementById("searchInput").value.trim();
    if (!query) return;
    
    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&limit=1`)
        .then(res => res.json())
        .then(data => {
            if (data.length === 0) {
                showToast("لم يتم العثور على الموقع");
                return;
            }
            const lat = parseFloat(data[0].lat);
            const lng = parseFloat(data[0].lon);
            const name = data[0].display_name;
            selectedPosition = { lat, lng };
            map.setView([lat, lng], 16);
            currentMarker.setLatLng([lat, lng]);
            currentMarker.bindPopup(`📍 ${name}`).openPopup();
            showToast(`📍 تم العثور على: ${name.substring(0, 50)}`);
        })
        .catch(() => showToast("خطأ في البحث"));
}

function getUserLocation() { // دالة خص تحديد الموقع عبر جي بي اس
    if (!navigator.geolocation) {
        showToast("المتصفح لا يدعم تحديد الموقع");
        return;
    }
    
    showToast("📍 جاري تحديد موقعك...");
    
    navigator.geolocation.getCurrentPosition(
        (pos) => {
            const { latitude, longitude } = pos.coords;
            selectedPosition = { lat: latitude, lng: longitude };
            map.setView([latitude, longitude], 15);
            currentMarker.setLatLng([latitude, longitude]);
            showToast("✅ تم تحديد موقعك بنجاح");
        },
        (error) => {
            let errorMessage = "تعذر تحديد الموقع";
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    errorMessage = "❌ الرجاء السماح بتحديد الموقع";
                    break;
                case error.POSITION_UNAVAILABLE:
                    errorMessage = "❌ معلومات الموقع غير متوفرة";
                    break;
                case error.TIMEOUT:
                    errorMessage = "⏰ انتهى وقت محاولة تحديد الموقع";
                    break;
            }
            showToast(errorMessage);
        }
    );
}

function showToast(msg, duration = 3000) {
    const toast = document.createElement("div");
    toast.className = "toast-msg";
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), duration);
}

// ======================== دالة إرسال البلاغ الرئيسية ========================

async function sendReport() {
  
    
    // 2. التحقق من اختيار نوع المشكلة
    if (!selectedProblemType) {
        showToast("⚠️ الرجاء اختيار نوع المشكلة أولاً");
        return;
    }
    
    // 3. التحقق من كتابة وصف المشكلة
    const description = document.getElementById('problemDescription').value.trim();
    if (!description) {
        showToast("⚠️ الرجاء إدخال وصف للمشكلة");
        document.getElementById('problemDescription').focus();
        return;
    }
    
    // 4. التأكد من أن الوصف لا يتجاوز 500 حرف
    if (description.length > 500) {
        showToast("⚠️ وصف المشكلة يتجاوز 500 حرف");
        return;
    }
    
    // الحصول على بيانات المستخدم الحالي (إن وجدت)
    let currentUser = null;
    let userIdentifier = 'guest_' + Date.now();
    let userName = 'زائر';
    try {
        const userStr = localStorage.getItem('currentUser');
        if (userStr) {
            currentUser = JSON.parse(userStr);
            userIdentifier = currentUser.identifier || currentUser.email || currentUser.phone || userIdentifier;
            userName = `${currentUser.firstName || ''} ${currentUser.lastName || ''}`.trim() || 'مستخدم';
        }
    } catch(e) {
        console.log('لا يوجد مستخدم مسجل');
    }
    
    // 5. إنشاء FormData للإرسال
    const formData = new FormData();
    formData.append('problemType', selectedProblemType);
    formData.append('problemTypeName', document.querySelector('.icon-container.active .icon-title')?.textContent || '');
    formData.append('description', description);
    formData.append('latitude', selectedPosition.lat);
    formData.append('longitude', selectedPosition.lng);
    formData.append('address', document.getElementById('searchInput').value || 'لم يتم تحديد عنوان');
    formData.append('timestamp', new Date().toISOString());
    
    // إضافة الصور
    for (let i = 0; i < selectedImageFiles.length; i++) {
        formData.append('images', selectedImageFiles[i]);
    }
    
    // 6. تعطيل زر الإرسال ومنع الضغط المتكرر
    const sendBtn = document.getElementById('sendReportBtn');
    const originalText = sendBtn.textContent;
    sendBtn.textContent = '⏳ جاري الإرسال...';
    sendBtn.disabled = true;
    
    // إنشاء معرف فريد للبلاغ
    const reportId = 'rep_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
    
    try {
        // 7. محاولة إرسال البلاغ إلى API
        const result = await sendReportToAPI(formData);
        
        // 8. عرض رسالة نجاح مع تفاصيل البلاغ
        showToast(`✅ تم إرسال البلاغ بنجاح! رقم التتبع: ${result.reportId || reportId}`);
        
        // 9. حفظ نسخة في localStorage للسجلات المحلية باستخدام المفتاح الموحد
        const reportForLocal = {
            reportId: result.reportId || reportId,
            problemType: selectedProblemType,
            problemTypeName: document.querySelector('.icon-container.active .icon-title')?.textContent || '',
            description: description,
            latitude: selectedPosition.lat,
            longitude: selectedPosition.lng,
            address: document.getElementById('searchInput').value || 'لم يتم تحديد عنوان',
            timestamp: new Date().toISOString(),
            userIdentifier: userIdentifier,
            userName: userName,
            status: 'pending', // pending, processing, processed, completed
            imagesCount: selectedImageFiles.length,
            serverSaved: true,
            syncPending: false
        };
        saveReportLocally(reportForLocal);
        
        // 10. إرسال إشارة إلى الصفحة الرئيسية لتحديث الإحصائيات
        localStorage.setItem('stats_updated', Date.now().toString());
        
        // 11. إعادة تعيين النموذج بعد 1.5 ثانية
        setTimeout(() => {
            resetForm();
            showToast("✨ يمكنك إرسال بلاغ جديد");
        }, 1500);
        
    } catch (error) {
        // 12. معالجة الأخطاء
        console.error('خطأ في الإرسال:', error);
        showToast(`❌ ${error.message}`);
        
        // 13. عرض خيار الحفظ المحلي كاحتياطي
        const shouldSaveLocally = confirm('⚠️ فشل الاتصال بالخادم. هل تريد حفظ البلاغ محلياً وإرساله لاحقاً؟');
        if (shouldSaveLocally) {
            const localReport = {
                reportId: reportId,
                problemType: selectedProblemType,
                problemTypeName: document.querySelector('.icon-container.active .icon-title')?.textContent || '',
                description: description,
                latitude: selectedPosition.lat,
                longitude: selectedPosition.lng,
                address: document.getElementById('searchInput').value || 'لم يتم تحديد عنوان',
                timestamp: new Date().toISOString(),
                userIdentifier: userIdentifier,
                userName: userName,
                status: 'pending',
                imagesCount: selectedImageFiles.length,
                pendingSync: true
            };
            saveReportLocally(localReport);
            resetForm();
            showToast('💾 تم حفظ البلاغ محلياً، سيتم إرساله عند استعادة الاتصال');
        }
        
    } finally {
        // 14. إعادة تفعيل الزر
        sendBtn.textContent = originalText;
        sendBtn.disabled = false;
    }
}

/**
 * إعادة تعيين النموذج بالكامل
 */
function resetForm() {
    // إعادة تعيين نوع المشكلة
    selectedProblemType = null;
    document.querySelectorAll('.icon-container').forEach(i => i.classList.remove('active'));
    
    // إعادة تعيين وصف المشكلة
    const textarea = document.getElementById('problemDescription');
    textarea.value = '';
    const event = new Event('input', { bubbles: true });
    textarea.dispatchEvent(event);
    
    // إعادة تعيين الصور
    selectedImageFiles = [];
    renderGallery();
    
    // إعادة تعيين موقع افتراضي (اختياري)
    // لا نغير موقع المستخدم تلقائياً
}

// ======================== إعداد المستمعات ========================

function setupEventListeners() {// ربط كل دالة بالزر المخصص لها 
    document.getElementById('gpsBtn').addEventListener('click', getUserLocation);
    document.getElementById('searchBtn').addEventListener('click', searchLocation);
    document.getElementById('sendReportBtn').addEventListener('click', sendReport);
    
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            searchLocation();
        }
    });
}


// ======================== تهيئة الصفحة ========================

window.onload = async () => {
   
    // 2. تهيئة المكونات
    initMap();//دالة تخص للخريظ
    setupProblemTypeSelection();//دالة تخص نوع المشكلة
    setupProblemDescriptionEnhancements();//وصف المشكلة 
    setupEventListeners();//ربط كل دالة بالزر المخصص لها 
    setupAutocomplete();//البحث
    setupMultipleImageUpload();//الصور المتعددة
    renderGallery();//ماذا يحدث عند اختيار صورة محددة
    
    // 3. محاولة مزامنة أي بلاغات معلقة
    await syncPendingReports();
    
    // 4. عرض رسالة ترحيب
   showToast("👋 يمكنك إرسال بلاغ جديد");
    
    console.log('✅ الصفحة جاهزة، انتظار إرسال البلاغات...');
};

// تصدير بعض الدوال للاستخدام العالمي (للتصحيح)
window.CivicEye = {
    sendReport,
    checkAuthentication,
    logout,
   
};
