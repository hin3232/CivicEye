<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>CivicEye</title>
<style>
    body{
        background-image:url(imags/1.png);
        background-size:100%100%;
        background-repeat: no-repeat;
        background-position: center;
        height: 100vh;
        overflow: hidden;
        margin: 0;
        padding: 0;
    }
    .overlay{
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(255,255,255,0.5);
    }
    .rectangle{
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 140px;
        background-color: #474747;
        margin: 0;
        padding: 0;
        clip-path: polygon(0 60%,100%0,100%100%,0 100%);
    }
    .square{
        position: absolute;
        top: 40%;
        right: 22%;
        transform: translateY(-50%);
        width:300px;
        height: 300px;
        background-color: rgba(89, 89, 89, 0.5);
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
    
    .input-field{
        width: 75%;
        height: 20px;
        margin-bottom: 10px;
        padding: 10px;
        border: none;
        background-color: rgba(36, 36, 36, 0.5);
        color: #fff;
    }
    .input-field::placeholder{
        color: #fff;
        opacity:0.7;
    }
    .login-btn{
        width: 242px;
        height:35px;
        background-color: #1a0068;
        color: #fff;
        border: none;
        cursor: pointer;
        border-radius: 5px;
        margin-top: 10px;
        margin-bottom: 10px;
    }
    .login-btn:hover{
    background-color: #13004b;
    }
    .creat-btn{
        width:150px;
        height: 30px;
        background-color: #3e61ff;
        border: none;
        border-radius: 5px;
        margin-top: 10px;
    }
    .creat-btn:hover{
        background-color: #5e7cff;
    }
    .text{
        position: absolute;
        top: 20%;
        left: 23%;
        transform: translateY(-50%);
        font-size: 40px;

    }
    .text2{
        position: absolute;
        top:25%;
        right: 45%;
        padding-right: 55px;    
        
    }
    .forget{
        color: #fff;
        text-decoration: none;
    }
    .forget:hover{
        color: #ccc;
    }
   
</style> 
</head>
<body >
<div class="overlay" >
    <div class="square">
        <input type="tel" type ="email"class="input-field" placeholder= "رقم الهاتف او البريد الالكتروني" dir="rtl">
        <input type="password" class="input-field" placeholder="كلمة المرور">
        <button class="login-btn"><a href="home.html" style="color: #fff;text-decoration: none;">تسجيل الدخول</a></button>
        <div  ><a href="#" class="forget"class="dynapuff">هل نسيت كلمة السر</a></div>
        <button class="creat-btn"><a href="creat.html" style="color: #fff;text-decoration: none;">انشاء حساب</a></button>
    </div>

</div>
    <div class="text">
        <h1><span style="color: #404243">Civic</span><span style="color: #042650">Eye</span></h1>
    </div>
    <div class="text2">
        <p> <span style="color: #6b6767;font-size: 30px" >منصة تتيح لك التبليغ عن مشاكل بكل سهولة<br> 
        صور,ارسل,وتابع حالة الابلاغ خطوة بخطوة<br> <span style="margin-right: 100px;">لنجعل مدينتنا افصل معا</span></span></p>

    </div>
<div class="rectangle"></div>
</body>
</html>
